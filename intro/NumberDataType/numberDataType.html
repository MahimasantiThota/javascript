<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Data Type</title>

    <link rel="stylesheet" href="numberDataType.css">
</head>
<body>

    <h1>Number Data Type in JavaScript</h1>

    <p>
        In JavaScript, the Number data type is used to represent both
        integer and floating-point numbers.
    </p>

    <h2>Examples of Number Data Type</h2>

    <ul>
        <li>Integer: <code>42</code></li>
        <li>Floating-point: <code>3.14</code></li>
        <li>Negative number: <code>-7</code></li>
        <li>NaN: <code>NaN</code></li>
        <li>Infinity: <code>Infinity</code></li>
    </ul>

    <label for="txtFirstNumber">First Number:</label>
    <input type="number" id="txtFirstNumber">

    <br><br>

    <label for="txtSecondNumber">Second Number:</label>
    <input type="number" id="txtSecondNumber">

    <br><br>

    <button id="btnAdd" onclick="onClickAdd()">Add</button>
    <button id="btnSub" onclick="onClickSub()">Sub</button>
    <button id="btnDiv" onclick="onClickDiv()">Div</button>
    <button id="btnMul" onclick="onClickMul()">Mul</button>

    <h3 id="result"></h3>

    <script src="numberDataType.js"></script>

</body>
</html>
