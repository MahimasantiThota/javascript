<!DOCTYPE html>
<html>
<head>
    <title>Assignment Operators Demo</title>
</head>
<body>

<div class="container">
      <h1>Basic Assignment Operators</h1>

    <label>Enter a Number:</label>
    <input type="number" id="num" value="10">

    <div class="buttons">
        <button onclick="addAssign()">+= 5</button>
        <button onclick="subAssign()">-= 2</button>
        <button onclick="mulAssign()">*= 3</button>
        <button onclick="divAssign()">/= 2</button>
    </div>

    <div id="output"></div>
</div>

<script src="basicAssignmentOperators.js"></script>

</body>
</html>
